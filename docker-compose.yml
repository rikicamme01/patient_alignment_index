version: '3.9'

services:
  # Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: patient_alignment_db
    environment:
      POSTGRES_DB: ${DB_NAME:-patient_alignment}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patient_alignment_network

  # Applicazione Django
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: patient_alignment_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-patient_alignment}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - static_files:/app/staticfiles
    networks:
      - patient_alignment_network
    restart: unless-stopped

  # Redis per cache e task queue (opzionale)
  redis:
    image: redis:7-alpine
    container_name: patient_alignment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patient_alignment_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:

networks:
  patient_alignment_network:
    driver: bridge
